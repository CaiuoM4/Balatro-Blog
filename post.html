<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Balatro - Guias Estratégicos</title>
    <!-- ÍCONE EM SVG DE CARTA CURINGA SEM FUNDO -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cstyle%3E.moldura%7Bfill:none;stroke:%23ffffff;stroke-width:2;stroke-linejoin:round;%7D.detalhe%7Bfill:%23ff4141;%7D.boca%7Bfill:none;stroke:%23ff4141;stroke-width:1.5;stroke-linecap:round;%7D%3C/style%3E%3Crect x='4' y='2' width='24' height='28' rx='3' class='moldura'/%3E%3Cpath d='M12 11c0-1.5 1.5-3 4-3s4 1.5 4 3c0 2-2 2.5-2 4h-4z' class='detalhe'/%3E%3Ccircle cx='14' cy='12' r='1' fill='%23ffffff'/%3E%3Ccircle cx='18' cy='12' r='1' fill='%23ffffff'/%3E%3Cpath d='M13 21q3 2 6 0' class='boca'/%3E%3Ccircle cx='16' cy='7' r='1.5' class='detalhe'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="css/estilo.css">
    <style>
        .secao-guias-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            position: relative;
        }
        .btn-filtro-config {
            background: #222;
            color: #fff;
            border: 2px solid #444;
            padding: 10px;
            font-size: 22px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
        }
        .btn-filtro-config:hover {
            transform: rotate(45deg);
            border-color: #ff4141;
            color: #ff4141;
        }
        .dropdown-filtro {
            display: none;
            position: absolute;
            right: 0;
            top: 55px;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 8px;
            z-index: 10;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
            overflow: hidden;
            width: 180px;
        }
        .dropdown-filtro button {
            background: transparent;
            color: #ccc;
            border: none;
            width: 100%;
            padding: 12px 15px;
            text-align: left;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .dropdown-filtro button:hover {
            background: #ff4141;
            color: white;
        }
        .dropdown-filtro.show {
            display: block;
        }
        .grid-guias-principal {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .card-guia-compacto {
            background: #181818;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.3s, border-color 0.3s;
        }
        .card-guia-compacto:hover {
            transform: translateY(-5px);
            border-color: #ff4141;
        }
        .card-guia-compacto h3 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #fff;
        }
        .card-guia-compacto p {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        .meta-dados {
            font-size: 11px;
            color: #666;
            margin-top: auto;
            border-top: 1px solid #222;
            padding-top: 8px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <h1>Balatro<span>Blog</span></h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="post.html" class="active">Guias</a></li>
                <li><a href="sobre.html">Sobre Nós</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        
        <div class="secao-guias-header">
            <h2 class="titulo-secao" style="margin: 0;">Central de Guias</h2>
            <button class="btn-filtro-config" onclick="toggleFiltro()" title="Filtrar Posts">⚙️</button>
            <div class="dropdown-filtro" id="menuFiltro">
                <button onclick="filtrarEOrdenar('recentes')">⏳ Mais Recentes</button>
                <button onclick="filtrarEOrdenar('velhos')">📅 Mais Velhos</button>
                <button onclick="filtrarEOrdenar('acessados')">🔥 Mais Acessados</button>
                <button onclick="filtrarEOrdenar('uteis')">⭐ Mais Úteis</button>
            </div>
        </div>

        <div class="grid-guias-principal" id="containerGuias">
            <!-- Gerado dinamicamente via JS -->
        </div>

    </main>

    <footer>
        <p>&copy; 2026 Blog Balatro. Desenvolvido para fins educacionais.</p>
        <p>1º Ano - Curso Técnico em Desenvolvimento de Sistemas</p>
    </footer>

    <script>
        const postsData = [
            {
                titulo: "Guia Iniciante: Como Funciona o Multiplicador (Mult)",
                descricao: "Entenda a diferença crucial entre somar e multiplicar seus pontos para vencer os Blinds.",
                link: "post-mult.html",
                timestamp: new Date("2026-06-26T10:00:00").getTime(),
                visualizacoes: 1420,
                uteis: 95
            },
            {
                titulo: "Os 3 Melhores Baralhos e Builds para Começar",
                descricao: "Análise completa das estratégias PhotoChad, Steel Kings e a lendária Triboulet Build.",
                link: "baralhos.html",
                timestamp: new Date("2026-06-27T15:30:00").getTime(),
                visualizacoes: 2580,
                uteis: 140
            },
            {
                titulo: "Guia de Economia: Gerenciando Juros",
                descricao: "Aprenda a poupar seus dólares para render o máximo de juros acumulados por round.",
                link: "post-economia.html",
                timestamp: new Date("2026-06-24T08:00:00").getTime(),
                visualizacoes: 890,
                uteis: 60
            },
            {
                titulo: "Cartas de Tarô vs Cartas de Planeta",
                descricao: "Qual investimento priorizar na sua loja para garantir consistência no late-game?",
                link: "post-cartas.html",
                timestamp: new Date("2026-06-25T11:15:00").getTime(),
                visualizacoes: 1100,
                uteis: 88
            },
            {
                titulo: "Desvendando os Boss Blinds",
                descricao: "Como contra-atacar chefes que anulam naipes inteiros ou obrigam a jogar cartas viradas.",
                link: "post-chefes.html",
                timestamp: new Date("2026-06-23T14:20:00").getTime(),
                visualizacoes: 1750,
                uteis: 110
            }
        ];

        function toggleFiltro() {
            document.getElementById('menuFiltro').classList.toggle('show');
        }

        window.onclick = function(event) {
            if (!event.target.matches('.btn-filtro-config')) {
                const dropdown = document.getElementById('menuFiltro');
                if (dropdown.classList.contains('show')) { dropdown.classList.remove('show'); }
            }
        }

        function formatarData(timestamp) {
            const data = new Date(timestamp);
            return data.toLocaleDateString('pt-BR') + ' às ' + data.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
        }

        function renderizarCards(lista) {
            const container = document.getElementById('containerGuias');
            container.innerHTML = "";
            lista.forEach(post => {
                const card = document.createElement('div');
                card.classList.add('card-guia-compacto');
                card.innerHTML = `
                    <div>
                        <h3>${post.titulo}</h3>
                        <p>${post.descricao}</p>
                    </div>
                    <div class="meta-dados">
                        <div>📅 ${formatarData(post.timestamp)}</div>
                        <div style="margin-top: 4px; display: flex; justify-content: space-between; margin-bottom: 10px;">
                            <span>👁️ ${post.visualizacoes}</span>
                            <span>⭐ ${post.uteis} úteis</span>
                        </div>
                        <a href="${post.link}" class="btn-ler-mais" style="display:block; text-align:center; font-size:12px; padding:6px;">Acessar Guia</a>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filtrarEOrdenar(criterio) {
            let postsOrdenados = [...postsData];
            if (criterio === 'recentes') postsOrdenados.sort((a, b) => b.timestamp - a.timestamp);
            else if (criterio === 'velhos') postsOrdenados.sort((a, b) => a.timestamp - b.timestamp);
            else if (criterio === 'acessados') postsOrdenados.sort((a, b) => b.visualizacoes - a.visualizacoes);
            else if (criterio === 'uteis') postsOrdenados.sort((a, b) => b.uteis - a.uteis);
            renderizarCards(postsOrdenados);
        }

        filtrarEOrdenar('recentes');
    </script>
</body>
</html>
